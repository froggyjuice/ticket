<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="연지홀 공연 좌석을 선택하고 예매자 정보를 입력해 예매를 완료하는 기본 티켓 예매 화면입니다.">
    <title>연지홀 티켓 예매</title>
    <link rel="stylesheet" href="style.css?v=5">
</head>
<body>
    <main class="page-shell">
        <header class="top-bar">
            <div>
                <p class="eyebrow">HEXA Ticket</p>
                <h1>연지홀 티켓 예매</h1>
            </div>
            <button id="reset-demo" class="ghost-button" type="button">예매 초기화</button>
        </header>

        <nav class="steps" aria-label="예매 단계">
            <button class="step is-active" data-step="1" type="button">1 좌석 선택</button>
            <button class="step" data-step="2" type="button" disabled>2 정보 입력</button>
            <button class="step" data-step="3" type="button" disabled>3 예매 완료</button>
        </nav>

        <section id="step-seat" class="screen is-active">
            <div class="seat-layout">
                <aside class="control-card">
                    <div class="section-heading compact">
                        <span>좌석 선택</span>
                        <h2>원하는 좌석을 선택하세요</h2>
                    </div>

                    <div class="filter-row">
                        <button class="filter is-active" data-floor="all" type="button">전체</button>
                        <button class="filter" data-floor="1F" type="button">1층</button>
                        <button class="filter" data-floor="2F" type="button">2층</button>
                    </div>

                    <p id="block-helper" class="block-helper">블록을 먼저 선택하면 해당 블록 좌석이 확대됩니다.</p>
                    <button id="back-blocks" class="ghost-button full is-hidden" type="button">블록 전체 보기</button>

                    <div class="legend">
                        <span><i class="legend-dot available"></i>선택 가능</span>
                        <span><i class="legend-dot selected"></i>선택 좌석</span>
                        <span><i class="legend-dot reserved"></i>예매 완료</span>
                        <span><i class="legend-dot blocked"></i>선택 불가</span>
                    </div>
                </aside>

                <article class="seat-card">
                    <div class="stage">무대</div>
                    <div id="seat-map" class="seat-map"></div>
                </article>

                <aside class="summary-card sticky">
                    <h2>선택 내역</h2>
                    <div id="summary-seat" class="summary-list"></div>
                    <button id="go-info" class="primary-button" type="button" disabled>예매 정보 입력</button>
                </aside>
            </div>
        </section>

        <section id="step-info" class="screen">
            <div class="content-grid">
                <article class="main-card">
                    <div class="section-heading">
                        <span>예매자 정보</span>
                        <h2>입장 확인에 사용할 정보를 입력하세요</h2>
                    </div>

                    <form id="booking-form" class="booking-form simple">
                        <label>
                            이름
                            <input id="buyer-name" type="text" placeholder="홍길동" autocomplete="name" required>
                        </label>
                        <label>
                            전화번호
                            <input id="buyer-phone" type="tel" placeholder="010-0000-0000" autocomplete="tel" required>
                        </label>
                        <label class="agree-row">
                            <input id="agree-check" type="checkbox" required>
                            선택한 좌석 예매 내용을 확인했습니다.
                        </label>
                    </form>
                </article>

                <aside class="summary-card">
                    <h2>예매 확인</h2>
                    <p id="confirm-message" class="confirm-message"></p>
                    <div id="summary-payment" class="summary-list"></div>
                    <button id="back-seat" class="ghost-button full" type="button">좌석 다시 선택</button>
                    <button id="complete-booking" class="primary-button" type="button">예매 완료하기</button>
                </aside>
            </div>
        </section>

        <section id="step-complete" class="screen">
            <article class="complete-card">
                <span class="complete-mark">완료</span>
                <h2 id="complete-title">예매가 완료되었습니다</h2>
                <p>예매번호와 좌석 정보를 확인해 주세요.</p>
                <div id="complete-detail" class="receipt"></div>
                <button id="new-booking" class="primary-button narrow" type="button">새 예매하기</button>
            </article>
        </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="app.js?v=5"></script>
</body>
</html>
